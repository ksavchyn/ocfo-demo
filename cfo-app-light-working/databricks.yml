bundle:
  # Internal bundle identifier. Used as a directory name inside the workspace
  # state path (`.bundle/<bundle.name>/...`). Customers don't see this — they
  # see whatever they pass as --app-name. Don't rename without also migrating
  # any existing terraform state, or `bundle deploy` will fail to update
  # existing resources and try to create new ones with the same display name.
  name: cfo-demo-wip

# Note on dashboard templating: dashboard .lvdash.json files have hardcoded
# `main.cfo_proserv_dev` references in their SQL. Lakeview doesn't support
# variable substitution, and bundles treat .lvdash.json as opaque resources.
# Workaround: deploy.sh runs scripts/build_dashboards.py BEFORE
# `databricks bundle deploy` to generate `dashboards/_build/*.lvdash.json`
# with the right catalog.schema baked in, then the bundle's dashboard
# resources reference those build outputs.

# ─── Files to exclude from bundle sync ─────────────────────────────────────
# Internal planning docs, audit notes, and backup files stay in the repo for
# our reference but should NEVER ship to a customer workspace. The bundle is
# customer-shipping; if it would feel weird with a customer's eyes on it,
# exclude it.
sync:
  exclude:
    # Internal planning + audit docs
    - "genie_insights/PROJECT_PLAN.md"
    - "genie_insights/bronze_realism_audit.md"
    - "genie_insights/table_consumer_audit.md"
    - "genie_insights/data_quality_findings.md"
    - "genie_insights/admin_baseline_pre_single_call_test.md"
    - "genie_insights/insights_after_1call_test.md"
    - "genie_insights/output_contract.md"
    # Backup files
    - "**/*.bak"
    - "**/*.bak2"
    - "**/*.bak3"
    - "**/*.pre_cleanup.bak"
    # Internal helper scripts not used by the bundle
    - "deploy_to_main.py"
    # Dashboards are deployed as Lakeview resources from local content at deploy
    # time — they don't need to be synced as workspace files. _build/ is also
    # ephemeral build output regenerated by scripts/build_dashboards.py.
    - "dashboards/**/*.lvdash.json"
    # Local-only state files
    - "genie_insights/dev_space_id.json"
    - "genie_insights/merged_space_id.json"
    # Compiled artifacts
    - "**/__pycache__/**"

# ─── Bundle variables ──────────────────────────────────────────────────────
# Everything customer-tunable is a variable. No per-environment overrides —
# one bundle, one target, all environment differences passed in as --vars
# (or via deploy.sh flags).
variables:
  app_name:
    description: "Name of the Databricks App resource. Customer can pick anything."
    default: "cfo-demo"

  workspace_root_path:
    description: "Workspace path where bundle files + app source are synced."
    default: "/Workspace/Users/${workspace.current_user.userName}/cfo-app"

  catalog:
    description: "Unity Catalog catalog name where demo data lives."
    default: "main"

  schema_name:
    description: "Schema name for the demo data (under {catalog})."
    default: "cfo_proserv"

  skip_hydrate_bronze:
    description: |
      Set to "true" to skip synthetic bronze generation on the next pipeline run.
      Used by customers who have already run `customer_mapping.py` to emit
      bronze_* views over their real data — the next data-pipeline run with this
      flag preserves those views and rebuilds silver/gold on top. Default
      "false" produces the full synthetic demo. Toggled via deploy.sh's
      `--skip-bronze-hydrate` flag.
    default: "false"

  warehouse_id:
    description: "Databricks SQL Warehouse ID used for app reads + dashboard rendering. REQUIRED."
    default: ""

  genie_space_id:
    description: "Genie space ID. Leave empty to auto-provision on first deploy. Subsequent deploys pass the existing space's ID."
    default: ""

  genie_space_title:
    description: |
      Title for the Genie space the bundle creates/looks-up. Pick something
      unique to this deployment (e.g. 'CFO Demo — Prod'). On first deploy the
      bundle creates a space with this exact title; on re-deploy the bundle
      looks up by this title and updates it in place. Avoid the generic
      default in shared workspaces — collisions force the API to silently
      append a timestamp to the new space title, which then breaks re-deploy
      lookup.
    default: "CFO Demo"

  claude_endpoint_url:
    description: "URL to Claude /chat/completions endpoint. Default = workspace's auto-provisioned AI Gateway path. Every Databricks workspace ships with this gateway plus the databricks-claude-opus-4-7 model already serving behind it. Zero customer setup."
    default: "${workspace.host}/ai-gateway/mlflow/v1"

  claude_model:
    description: "[LEGACY — kept as default for both compose + agent if you don't override below] Model name served at claude_endpoint_url. Customers can leave this and let claude_model_compose / claude_model_agent be the authoritative settings."
    default: "databricks-claude-opus-4-7"

  claude_model_compose:
    description: |
      Claude model used for COMPOSE-AROUND-GIVEN-VALUES tasks: orchestrator
      generating insight/action narratives from direct SQL outputs, AND chip
      click-through synthesis (replaying cached Genie data into a markdown
      answer). Output is grounded in given inputs — no judgment, no
      tool-calling. Haiku is plenty smart for this and ~30% faster + much
      cheaper than Opus.
    default: "databricks-claude-haiku-4-5"

  claude_model_agent:
    description: |
      Claude model used for AGENT / JUDGMENT tasks: the runtime chat path
      where Claude has to plan Genie tool calls, interpret Genie responses
      (which can be messy), and refuse fabrication when data is incomplete.
      Quality matters more than speed here — Opus is recommended.
    default: "databricks-claude-opus-4-7"

  finance_dashboard_id:
    description: "Lakeview dashboard ID for Finance Dashboard. Resolved from bundle resource at deploy time."
    default: "${resources.dashboards.cfo_finance_dashboard.id}"

  admin_dashboard_id:
    description: "Lakeview dashboard ID for Admin Dashboard. Resolved from bundle resource at deploy time."
    default: "${resources.dashboards.admin_dashboard.id}"

# ─── Top-level resources (shared by all targets) ───────────────────────────
# Defining resources at the top level — rather than nested under a specific
# target — means every named target inherits the same job/app/dashboard
# definitions. Targets just specify *which workspace* to deploy them to
# (via the `workspace:` block + --profile at deploy time). Each target has
# its own isolated terraform state at .databricks/bundle/<target>/, so a
# customer can deploy this same bundle to dev + staging + prod workspaces
# without lineage collisions.
resources:
  jobs:
    cfo_data_pipeline:
      name: "CFO Demo — Data Pipeline (${var.app_name})"
      description: |
        End-to-end pipeline:
          1. hydrate_bronze              — 23 bronze tables, envelope-driven synthetic data
          2. build_silver_gold           — 9 silver + 12 gold tables
          3. envelope_safety_net         — ~30 assertions against plausibility_envelope.yml (gates downstream)
          4. provision_genie_space       — creates/refreshes Genie space + trusted queries
          5. generate_insights           — Claude orchestrator over Genie, populates gold_persona_insights
          6. validate_consistency        — prose-vs-data drift checks on generated insights
          7. refresh_dashboards          — refreshes Lakeview dashboards against fresh data
      tasks:
        - task_key: hydrate_bronze
          notebook_task:
            notebook_path: ./data_pipeline/01_generate_bronze_data.py
            base_parameters:
              CFO_CATALOG: ${var.catalog}
              CFO_SCHEMA_NAME: ${var.schema_name}
              # When "true", notebook exits without writing — preserves
              # customer_mapping.py's bronze_* views as the data source.
              CFO_SKIP_HYDRATE_BRONZE: ${var.skip_hydrate_bronze}
        - task_key: build_silver_gold
          depends_on:
            - task_key: hydrate_bronze
          notebook_task:
            notebook_path: ./data_pipeline/02_build_silver_gold.py
            base_parameters:
              CFO_CATALOG: ${var.catalog}
              CFO_SCHEMA_NAME: ${var.schema_name}
        - task_key: envelope_safety_net
          depends_on:
            - task_key: build_silver_gold
          notebook_task:
            # Validates the generated data against plausibility_envelope.yml.
            # NON-STRICT by default (CFO_SAFETY_NET_STRICT="false") — failures
            # land in `envelope_safety_net_failures` table for inspection,
            # but the pipeline continues so the customer gets a working
            # deploy even if a few calibration assertions are off. Flip the
            # flag to "true" during our own iteration when we WANT the
            # pipeline to fail loudly on calibration drift.
            notebook_path: ./data_pipeline/04_envelope_safety_net.py
            base_parameters:
              CFO_CATALOG: ${var.catalog}
              CFO_SCHEMA_NAME: ${var.schema_name}
              CFO_SAFETY_NET_STRICT: "false"
        - task_key: create_metric_views
          depends_on:
            - task_key: envelope_safety_net
          notebook_task:
            notebook_path: ./genie_config/apply_metric_views_notebook.py
            base_parameters:
              CFO_CATALOG: ${var.catalog}
              CFO_SCHEMA_NAME: ${var.schema_name}
              CFO_WAREHOUSE_ID: ${var.warehouse_id}
        - task_key: provision_genie_space
          depends_on:
            - task_key: create_metric_views
          notebook_task:
            notebook_path: ./genie_insights/provision_genie_space.py
            base_parameters:
              CFO_WAREHOUSE_ID: ${var.warehouse_id}
              CFO_CATALOG: ${var.catalog}
              CFO_SCHEMA_NAME: ${var.schema_name}
              CFO_GENIE_SPACE_ID: ${var.genie_space_id}
              CFO_GENIE_SPACE_TITLE: ${var.genie_space_title}
              CFO_FINANCE_DASHBOARD_ID: ${var.finance_dashboard_id}
              CFO_ADMIN_DASHBOARD_ID: ${var.admin_dashboard_id}
        - task_key: generate_insights
          depends_on:
            - task_key: provision_genie_space
          notebook_task:
            notebook_path: ./genie_insights/generate_insights.py
            base_parameters:
              CFO_CATALOG: ${var.catalog}
              CFO_SCHEMA_NAME: ${var.schema_name}
              CFO_WAREHOUSE_ID: ${var.warehouse_id}
              # Dynamic task-value reference — resolves at task-start time, AFTER
              # provision_genie_space has set tasks.provision_genie_space.values.space_id.
              # This fixes the first-time-deploy bug where ${var.genie_space_id} was
              # still empty when the job was submitted. See the 2026-05-16 incident in
              # git history.
              CFO_GENIE_SPACE_ID: "{{tasks.provision_genie_space.values.space_id}}"
              # Belt-and-suspenders: if the task-value reference above ever fails to
              # resolve, _resolve_genie_space_id() in generate_insights.py falls back
              # to a runtime title lookup using this title.
              CFO_GENIE_SPACE_TITLE: ${var.genie_space_title}
              CFO_CLAUDE_GATEWAY_URL: ${var.claude_endpoint_url}
              CFO_CLAUDE_MODEL: ${var.claude_model}
              CFO_CLAUDE_MODEL_COMPOSE: ${var.claude_model_compose}
              CFO_CLAUDE_MODEL_AGENT: ${var.claude_model_agent}
        - task_key: validate_consistency
          depends_on:
            - task_key: generate_insights
          notebook_task:
            notebook_path: ./data_pipeline/03_validate_consistency.py
            base_parameters:
              CFO_CATALOG: ${var.catalog}
              CFO_SCHEMA_NAME: ${var.schema_name}
              # LLM-extraction layer (optional second pass). Empty model =
              # disabled, regex-only validation. Haiku default keeps cost
              # bounded (~$0.005 / chip; only fires for chips that pass regex).
              CFO_CLAUDE_GATEWAY_URL: ${var.claude_endpoint_url}
              CFO_CLAUDE_MODEL_COMPOSE: ${var.claude_model_compose}
        - task_key: refresh_dashboards
          depends_on:
            - task_key: validate_consistency
          notebook_task:
            notebook_path: ./data_pipeline/04_refresh_dashboards.py
            base_parameters:
              CFO_FINANCE_DASHBOARD_ID: ${var.finance_dashboard_id}
              CFO_ADMIN_DASHBOARD_ID: ${var.admin_dashboard_id}
  apps:
    # Resource KEY is `cfo-demo-test` for legacy state-continuity reasons
    # (the original dev deploy used this key). Resource key is internal;
    # the user-visible app name comes from the `name:` field below, which
    # is parameterized via --app-name.
    cfo-demo-test:
      name: ${var.app_name}
      description: "CFO Operations Platform — Finance & Admin control center."
      source_code_path: ${var.workspace_root_path}/files
      # NOTE on env: the bundle sets these on the App *resource* (visible in
      # Apps UI > Environment tab). But the running app process reads env from
      # app.yml in the source code, not from the resource config. So
      # scripts/build_app_yml.py materializes these values into app.yml at
      # deploy time (called by deploy.sh between bundle deploys). Keep this
      # block in sync with build_app_yml.py — same names, same values.
      config:
        command:
          - "python"
          - "app.py"
        env:
          - name: "SQL_WAREHOUSE_ID"
            value: ${var.warehouse_id}
          - name: "CFO_SCHEMA"
            value: "${var.catalog}.${var.schema_name}"
          - name: "CFO_GENIE_SPACE_ID"
            value: ${var.genie_space_id}
          - name: "CFO_CLAUDE_GATEWAY_URL"
            value: ${var.claude_endpoint_url}
          - name: "CFO_CLAUDE_MODEL"
            value: ${var.claude_model}
          - name: "CFO_CLAUDE_MODEL_COMPOSE"
            value: ${var.claude_model_compose}
          - name: "CFO_CLAUDE_MODEL_AGENT"
            value: ${var.claude_model_agent}
          - name: "CFO_DASHBOARD_FINANCE_URL"
            value: "${workspace.host}/embed/dashboardsv3/${var.finance_dashboard_id}"
          - name: "CFO_DASHBOARD_ADMIN_URL"
            value: "${workspace.host}/embed/dashboardsv3/${var.admin_dashboard_id}"
  dashboards:
    cfo_finance_dashboard:
      display_name: "CFO Finance Dashboard"
      file_path: ./dashboards/_build/cfo_finance_dashboard_v2_dq_dev.lvdash.json
      warehouse_id: ${var.warehouse_id}
    admin_dashboard:
      display_name: "CFO Admin Dashboard"
      file_path: ./dashboards/_build/admin_dashboard_v2_dq_dev.lvdash.json
      warehouse_id: ${var.warehouse_id}

# ─── Named targets ─────────────────────────────────────────────────────────
# Each target = one Databricks workspace this bundle can be deployed to.
# Targets share the top-level resources/variables — they differ only in
# *where* those resources get materialized.
#
# Bundle CLI maintains a separate terraform state per target locally at
# .databricks/bundle/<target>/terraform/... and remotely at
# ${workspace_root_path}/state/terraform.tfstate, so dev/staging/prod deploys
# from the same local clone do not collide.
#
# Customer ergonomics: `databricks bundle deploy` with no --target picks
# whichever target has `default: true`. Customers can rename/add targets to
# match their own environment naming without touching anything else.
#
# Examples:
#   # Customer first-time deploy to their workspace (uses default target)
#   ./deploy.sh --profile customer-prod \
#               --catalog main --schema cfo_proserv --warehouse-id <id>
#
#   # Customer deploys same bundle to a second (staging) workspace
#   ./deploy.sh --profile customer-staging --target staging \
#               --catalog main --schema cfo_proserv --warehouse-id <id>
#
#   # Dev iteration (named app, isolated workspace path)
#   ./deploy.sh --profile <your-dev-profile> --target dev \
#               --catalog <catalog> --schema <schema> --warehouse-id <warehouse-id> \
#               --app-name cfo-demo-test \
#               --workspace-root-path /Workspace/Users/<your-email>/cfo-app-test
#
#   # Production deploy
#   ./deploy.sh --profile <your-prod-profile> --target prod \
#               --catalog <catalog> --schema <schema> --warehouse-id <warehouse-id> \
#               --app-name cfo-demo \
#               --workspace-root-path /Workspace/Users/<your-email>/cfo-app
targets:
  dev:
    default: true
    workspace:
      root_path: ${var.workspace_root_path}

  prod:
    workspace:
      root_path: ${var.workspace_root_path}
