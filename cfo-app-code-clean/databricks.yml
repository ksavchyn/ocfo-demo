bundle:
  name: cfo-demo-wip

targets:
  production:
    workspace:
      host: https://e2-demo-west.cloud.databricks.com
      root_path: /Workspace/Users/kateryna.savchyn@databricks.com/cfo-app

resources:
  apps:
    cfo-demo-wip:
      name: cfo-demo-wip
      description: "CFO Demo Landing Page - Finance & Admin Control Center with Databricks styling and Genie integration"
      source_code_path: "/Workspace/Users/kateryna.savchyn@databricks.com/cfo-app/files"
      config:
        command:
          - "python"
          - "app.py"
        env:
          - name: "FLASK_ENV"
