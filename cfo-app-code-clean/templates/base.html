<!-- templates/base.html - Base template with Databricks styling -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Finance & Admin Control Center - Databricks{% endblock %}</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">

    <!-- Chart.js for visualizations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    {% block head %}{% endblock %}
</head>
<body>
    <!-- Navigation Header -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <div class="logo-container">
                    <!-- Databricks logo placeholder -->
                    <div class="logo-placeholder">
                        <i class="fas fa-cube"></i>
                    </div>
                    <span class="brand-text">Finance & Admin Control Center</span>
                </div>
            </div>

            <div class="nav-center">
                <div class="nav-links">
                    <a href="{{ url_for('landing_page') }}" class="nav-link {% if request.endpoint == 'landing_page' %}active{% endif %}">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>Exec Summary</span>
                    </a>
                    <a href="{{ url_for('finance_deepdive') }}" class="nav-link {% if request.endpoint == 'finance_deepdive' %}active{% endif %}">
                        <i class="fas fa-coins"></i>
                        <span>Finance</span>
                    </a>
                    <a href="{{ url_for('admin_deepdive') }}" class="nav-link {% if request.endpoint == 'admin_deepdive' %}active{% endif %}">
                        <i class="fas fa-cogs"></i>
                        <span>Admin</span>
                    </a>
                    <a href="{{ url_for('hr_deepdive') }}" class="nav-link {% if request.endpoint == 'hr_deepdive' %}active{% endif %}">
                        <i class="fas fa-users"></i>
                        <span>HR</span>
                    </a>
                </div>
            </div>

            <!-- User Profile -->
            <div class="nav-user-section">
                <div class="user-profile" onclick="toggleUserDropdown()">
                    <div class="user-icon">👤</div>
                    <div class="user-info">
                        <div class="user-name" id="userName">Priya Patel</div>
                        <div class="user-role" id="userRole">Senior Partner</div>
                    </div>
                    <div class="dropdown-indicator">▼</div>
                </div>
                <div class="user-dropdown" id="userDropdown">
                    <div class="dropdown-item" onclick="selectUser('priya', 'Priya Patel', 'Senior Partner')">
                        <div class="dropdown-user-icon">👤</div>
                        <div class="dropdown-user-info">
                            <div class="dropdown-user-name">Priya Patel</div>
                            <div class="dropdown-user-role">Senior Partner</div>
                        </div>
                    </div>
                    <div class="dropdown-item" onclick="selectUser('sarah', 'Sarah Chen', 'Finance Director')">
                        <div class="dropdown-user-icon">👤</div>
                        <div class="dropdown-user-info">
                            <div class="dropdown-user-name">Sarah Chen</div>
                            <div class="dropdown-user-role">Finance Director</div>
                        </div>
                    </div>
                    <div class="dropdown-item" onclick="selectUser('michael', 'Michael Rodriguez', 'Chief Human Resources Officer')">
                        <div class="dropdown-user-icon">👤</div>
                        <div class="dropdown-user-info">
                            <div class="dropdown-user-name">Michael Rodriguez</div>
                            <div class="dropdown-user-role">Chief Human Resources Officer</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>


    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- Persona Management Script -->
    <script>
        // Initialize persona on page load
        document.addEventListener('DOMContentLoaded', function() {
            const storedPersona = sessionStorage.getItem('selectedPersona');
            const storedName = sessionStorage.getItem('selectedName');
            const storedRole = sessionStorage.getItem('selectedRole');

            if (storedPersona && storedName && storedRole) {
                // Update the display
                document.getElementById('userName').textContent = storedName;
                document.getElementById('userRole').textContent = storedRole;

                // Update any persona-specific content on the current page
                updatePersonaContent(storedPersona);
            }
        });

        // Toggle user dropdown
        function toggleUserDropdown() {
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('show');
        }

        // Select user and persist selection
        function selectUser(userId, userName, userRole) {
            // Update display
            document.getElementById('userName').textContent = userName;
            document.getElementById('userRole').textContent = userRole;

            // Store in sessionStorage for persistence
            sessionStorage.setItem('selectedPersona', userId);
            sessionStorage.setItem('selectedName', userName);
            sessionStorage.setItem('selectedRole', userRole);

            // Hide dropdown
            document.getElementById('userDropdown').classList.remove('show');

            // Update persona-specific content on the current page
            updatePersonaContent(userId);
        }

        // Update persona-specific content (for pages that have it)
        function updatePersonaContent(userId) {
            // Update visible questions based on user (if they exist on this page)
            const userQuestions = document.querySelectorAll('.user-questions');
            userQuestions.forEach(questions => {
                questions.classList.remove('active');
            });

            // Update visible insights based on user (if they exist on this page)
            const userInsights = document.querySelectorAll('.user-insights');
            userInsights.forEach(insights => {
                insights.classList.remove('active');
            });

            // Show the appropriate questions and insights for the selected user
            const selectedQuestions = document.querySelector(`.user-questions[data-user="${userId}"]`);
            const selectedInsights = document.querySelector(`.user-insights[data-user="${userId}"]`);

            if (selectedQuestions) {
                selectedQuestions.classList.add('active');
            }
            if (selectedInsights) {
                selectedInsights.classList.add('active');
            }
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', function(event) {
            const userProfile = document.querySelector('.user-profile');
            const dropdown = document.getElementById('userDropdown');

            if (userProfile && dropdown && !userProfile.contains(event.target)) {
                dropdown.classList.remove('show');
            }
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
